<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NeuroScan AI - Brain Tumor Detection</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0a0e1a, #050814);
    color: #e5e7eb;
    min-height: 100vh;
    display: flex;
}

.sidebar {
    width: 280px;
    background: rgba(15, 23, 42, 0.95);
    border-right: 1px solid rgba(255,255,255,0.08);
    padding: 24px;
    flex-shrink: 0;
}

.logo {
    font-size: 24px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 40px;
}

.status-bar {
    background: rgba(56, 189, 248, 0.1);
    border: 1px solid rgba(56, 189, 248, 0.3);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 12px;
    font-size: 14px;
}

/* Main */
.main {
    flex: 1;
    padding: 30px;
    display: flex;
    justify-content: center;
}

.card {
    width: 100%;
    max-width: 1100px;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 32px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
}

h1 {
    font-size: 28px;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #60a5fa, #a5b4fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.sub { color: #94a3b8; margin-bottom: 24px; }

/* Two Column Layout */
.content {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    align-items: start;
}

/* Left - Image Area */
.image-container {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.upload-area {
    border: 2px dashed #475569;
    border-radius: 20px;
    padding: 60px 20px;
    text-align: center;
    transition: all 0.3s ease;
    cursor: pointer;
    background: rgba(15, 23, 42, 0.4);
    min-height: 380px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.upload-area:hover {
    border-color: #60a5fa;
    background: rgba(96, 165, 250, 0.08);
}

#preview {
    width: 100%;
    max-height: 380px;
    object-fit: contain;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.1);
    background: #000;
    display: none;
}

/* Right - Result Area */
.result-panel {
    background: rgba(15, 23, 42, 0.6);
    border-radius: 20px;
    padding: 24px;
    border: 1px solid rgba(255,255,255,0.08);
    min-height: 380px;
}

#predictBtn {
    width: 100%;
    padding: 16px;
    font-size: 17px;
    font-weight: 600;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #3b82f6, #22c55e);
    color: white;
    cursor: pointer;
    margin-bottom: 20px;
}

#predictBtn:hover { transform: translateY(-2px); }
#predictBtn:disabled { opacity: 0.6; cursor: not-allowed; }

.loader {
    display: none;
    text-align: center;
    color: #60a5fa;
    margin: 15px 0;
}

.badge {
    padding: 6px 14px;
    border-radius: 9999px;
    font-size: 13px;
    font-weight: 700;
}

.success { background: #22c55e; color: #052e16; }
.danger { background: #ef4444; color: white; }
</style>
</head>
<body>

<div class="sidebar">
    <div class="logo">NeuroScan AI</div>
    <div class="status-bar"><strong>Status:</strong> Online</div>
    <div class="status-bar"><strong>Model:</strong> DeepCNN</div>
    <div class="status-bar"><strong>Device:</strong> Local CPU</div>
</div>

<div class="main">
    <div class="card">
        <h1>Brain Tumor Detection</h1>
        <p class="sub">Upload MRI scan for instant AI classification</p>

        <div class="content">
            <!-- Left Column -->
            <div class="image-container">
                <label class="upload-area" id="uploadBox">
                    <div>
                        <h3>Drop MRI Image Here</h3>
                        <p style="color:#64748b; margin-top:8px;">or click to browse</p>
                    </div>
                    <input type="file" id="fileInput" accept="image/*" style="display:none;">
                </label>
                <img id="preview" alt="MRI Preview">
            </div>

            <!-- Right Column -->
            <div class="result-panel">
                <button id="predictBtn">Analyze Scan</button>
                <div class="loader" id="loader">🔬 Analyzing with AI...</div>
                <div id="result">
                    <span class="badge success">Ready</span>
                    <p style="margin-top:20px; color:#94a3b8; text-align:center;">
                        Upload an image to get prediction
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const preview = document.getElementById('preview');
const predictBtn = document.getElementById('predictBtn');
const loader = document.getElementById('loader');
const resultDiv = document.getElementById('result');
let selectedFile = null;

const uploadBox = document.getElementById('uploadBox');

uploadBox.addEventListener('click', () => fileInput.click());

uploadBox.addEventListener('dragover', e => { e.preventDefault(); uploadBox.style.borderColor = '#60a5fa'; });
uploadBox.addEventListener('dragleave', () => uploadBox.style.borderColor = '#475569');
uploadBox.addEventListener('drop', e => {
    e.preventDefault();
    uploadBox.style.borderColor = '#475569';
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener('change', e => {
    if (e.target.files.length) handleFile(e.target.files[0]);
});

function handleFile(file) {
    selectedFile = file;
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
    uploadBox.style.display = "none";           // Hide upload box after upload
    predictBtn.disabled = false;
}

predictBtn.addEventListener('click', async () => {
    if (!selectedFile) return alert("Please upload an MRI image first");

    predictBtn.disabled = true;
    loader.style.display = "block";
    resultDiv.innerHTML = `<span class="badge">Processing...</span>`;

    const form = new FormData();
    form.append("file", selectedFile);

    try {
        const res = await fetch("/predict", { method: "POST", body: form });
        const data = await res.json();

        if (!res.ok) throw new Error(data.detail || "Prediction failed");

        let html = `
            <span class="badge success">RESULT</span><br><br>
            <strong>Prediction:</strong> ${data.prediction}<br><br>
            <strong>Confidence:</strong> ${(data.confidence * 100).toFixed(1)}%<br><br>
            <strong>Probabilities:</strong><br>
        `;

        for (let [cls, prob] of Object.entries(data.all_probabilities || {})) {
            html += `${cls}: ${(prob * 100).toFixed(1)}%<br>`;
        }

        resultDiv.innerHTML = html;

    } catch (err) {
        resultDiv.innerHTML = `<span class="badge danger">ERROR</span><br><br>${err.message}`;
    } finally {
        loader.style.display = "none";
        predictBtn.disabled = false;
    }
});
</script>
</body>
</html>
